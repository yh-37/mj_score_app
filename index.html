<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <title>🀄 MJ-SCORE PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        /* 既存のスタイルを継承しつつ、新規機能用を追加 */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --emerald-50: #ecfdf5;
            --emerald-100: #d1fae5;
            --emerald-400: #34d399;
            --emerald-500: #10b981;
            --emerald-600: #059669;
            --emerald-700: #047857;
            --emerald-800: #065f46;
            --orange-400: #fb923c;
            --orange-500: #f97316;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, .05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, .1), 0 4px 6px -4px rgba(0, 0, 0, .1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, .1), 0 8px 10px -6px rgba(0, 0, 0, .1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--slate-100);
            color: var(--slate-900);
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px 16px 100px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -1px;
            font-style: italic;
            color: var(--emerald-800);
        }

        /* Tab Navigation */
        .tab-bar {
            display: flex;
            background: #fff;
            border-radius: var(--radius-xl);
            padding: 4px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            border-radius: var(--radius-lg);
            font-size: 12px;
            font-weight: 800;
            color: var(--slate-400);
            cursor: pointer;
            transition: all .2s;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            background: var(--emerald-600);
            color: #fff;
            box-shadow: 0 4px 6px rgba(5, 150, 105, .3);
        }

        /* ── Summary & Panels (Reuse original CSS) ── */
        .uma-bar {
            background: #fff;
            padding: 10px 16px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--slate-200);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
        }

        .uma-label {
            font-size: 10px;
            font-weight: 900;
            color: var(--slate-400);
            text-transform: uppercase;
        }

        .uma-chips {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .uma-chip {
            display: flex;
            align-items: center;
            background: var(--slate-50);
            border-radius: 10px;
            padding: 4px 10px;
            border: 1px solid var(--slate-100);
        }

        .uma-chip input {
            width: 40px;
            background: transparent;
            border: none;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            color: var(--emerald-700);
            outline: none;
        }

        .panel {
            background: #fff;
            padding: 24px 20px;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg);
            margin-bottom: 24px;
            border-top: 8px solid var(--emerald-600);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .panel-title {
            font-size: 10px;
            font-weight: 900;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .player-row {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 8px 10px;
            border-radius: var(--radius-xl);
            transition: all .3s;
        }

        .player-row.active {
            background: var(--emerald-50);
            border: 1px solid var(--emerald-100);
        }

        .player-row.inactive {
            opacity: .35;
            filter: grayscale(1);
        }

        .player-name {
            width: 72px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: 700;
            outline: none;
        }

        .player-score {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--slate-200);
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            outline: none;
        }

        .btn-confirm {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-xl);
            font-size: 12px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            color: #fff;
            background: var(--emerald-600);
            box-shadow: var(--shadow-xl);
        }

        .btn-confirm:disabled {
            background: var(--slate-300);
            box-shadow: none;
        }

        /* ── Stats View ── */
        .stats-view {
            animation: slideIn .3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            background: #fff;
            border-radius: var(--radius-2xl);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-lg);
        }

        .stat-card-title {
            font-size: 10px;
            font-weight: 900;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .chart-wrap {
            width: 100%;
            height: 200px;
            margin-top: 10px;
            position: relative;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-item {
            background: var(--slate-50);
            padding: 12px;
            border-radius: var(--radius-lg);
            text-align: center;
        }

        .stat-val {
            font-family: 'JetBrains Mono';
            font-weight: 700;
            font-size: 18px;
            display: block;
        }

        .stat-label {
            font-size: 9px;
            color: var(--slate-400);
            font-weight: 800;
            text-transform: uppercase;
        }

        /* ── History Cards ── */
        .history-card {
            background: var(--slate-900);
            border-radius: var(--radius-xl);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--slate-800);
            color: #fff;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: 800;
        }

        .history-results {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .res-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'JetBrains Mono';
            font-size: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ── Table & Final Panel (Styles from your snippet) ── */
        .summary-panel {
            background: var(--slate-900);
            border-radius: var(--radius-2xl);
            margin-bottom: 24px;
            overflow: hidden;
            color: #fff;
            padding: 16px;
        }

        .final-panel {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border-radius: var(--radius-2xl);
            padding: 20px;
            margin-top: 20px;
            color: #fff;
        }

        .final-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .final-table th {
            color: rgba(255, 255, 255, 0.5);
            text-align: right;
            padding: 8px;
            font-size: 9px;
        }

        .final-table td {
            padding: 8px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'JetBrains Mono';
        }

        .final-table td:first-child {
            text-align: left;
            font-family: 'Inter';
        }

        .btn-save-session {
            width: 100%;
            padding: 16px;
            background: var(--orange-500);
            color: #fff;
            border: none;
            border-radius: var(--radius-xl);
            font-weight: 900;
            font-size: 12px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
        }

        /* ── Import/Export ── */
        .io-bar {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-io {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            background: var(--slate-200);
        }

        .btn-load-stats {
            width: 100%;
            padding: 18px 16px;
            border-radius: var(--radius-xl);
            border: 2px dashed var(--slate-300);
            background: var(--slate-50);
            font-size: 13px;
            font-weight: 800;
            color: var(--slate-500);
            cursor: pointer;
            transition: all .2s;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-load-stats:hover {
            border-color: var(--emerald-500);
            color: var(--emerald-700);
            background: var(--emerald-50);
        }

        .import-badge {
            display: inline-block;
            background: var(--emerald-600);
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 6px;
            margin-left: 8px;
            letter-spacing: 1px;
        }

        /* ── URL Loader ── */
        .url-loader-card {
            background: #fff;
            border-radius: var(--radius-xl);
            border: 1px solid var(--slate-200);
            padding: 14px 16px;
            margin-bottom: 12px;
        }

        .url-loader-title {
            font-size: 9px;
            font-weight: 900;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .url-preset-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .url-preset-btn {
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--slate-200);
            background: var(--slate-50);
            font-size: 10px;
            font-weight: 700;
            color: var(--slate-600);
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .url-preset-btn:hover,
        .url-preset-btn.selected {
            background: var(--emerald-50);
            border-color: var(--emerald-400);
            color: var(--emerald-700);
        }

        .url-input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .url-input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--slate-200);
            font-size: 11px;
            font-weight: 600;
            color: var(--slate-700);
            background: var(--slate-50);
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            min-width: 0;
        }

        .url-input:focus {
            border-color: var(--emerald-400);
            background: var(--emerald-50);
        }

        .btn-fetch {
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            background: var(--emerald-600);
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            cursor: pointer;
            white-space: nowrap;
            transition: background .15s;
        }

        .btn-fetch:disabled {
            background: var(--slate-300);
            cursor: not-allowed;
        }

        /* ── Player Detail Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            animation: fadeInBg .2s ease;
        }

        .modal-sheet {
            background: var(--slate-900);
            width: 100%;
            max-height: 90dvh;
            border-radius: 24px 24px 0 0;
            overflow-y: auto;
            padding: 16px 20px 48px;
            color: #fff;
            animation: slideUp .3s cubic-bezier(.32, .72, 0, 1);
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-section-title {
            font-size: 9px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px;
        }

        .rank-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .rank-bar-label {
            font-size: 11px;
            font-weight: 700;
            width: 28px;
            text-align: center;
        }

        .rank-bar-bg {
            flex: 1;
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 5px;
            overflow: hidden;
        }

        .rank-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width .6s ease;
        }

        .rank-bar-count {
            font-size: 10px;
            font-family: 'JetBrains Mono';
            color: rgba(255, 255, 255, 0.5);
            width: 48px;
            text-align: right;
        }

        .modal-stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 4px;
        }

        .modal-stat-item {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 10px 8px;
            text-align: center;
        }

        .modal-stat-val {
            font-family: 'JetBrains Mono';
            font-weight: 700;
            font-size: 16px;
            display: block;
        }

        .modal-stat-label {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rank-avg-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .rank-avg-table th {
            color: rgba(255, 255, 255, 0.4);
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .rank-avg-table td {
            padding: 8px;
            text-align: center;
            font-family: 'JetBrains Mono';
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeInBg {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <span class="logo">🀄 MJ-SCORE</span>
            <button class="tab-btn" style="width: auto; padding: 6px 12px; border: 1px solid var(--slate-300);"
                onclick="resetAll()">RESET</button>
        </header>

        <div class="tab-bar">
            <button class="tab-btn active" id="tab-game" onclick="switchTab('game')">SCORE</button>
            <button class="tab-btn" id="tab-stats" onclick="switchTab('stats')">STATS</button>
        </div>

        <div id="view-game">
            <div id="uma-container"></div>
            <div id="main-panel-container"></div>
            <div id="history-container"></div>
        </div>

        <div id="view-stats" class="stats-view" style="display:none">
            <div id="file-bar" style="margin-bottom:12px;">

                <!-- URL から読み込む（iPhone対応メイン機能） -->
                <div class="url-loader-card">
                    <div class="url-loader-title">📡 JSONファイルを読み込む</div>
                    <div class="url-preset-list" id="url-preset-list">
                        <!-- JSで生成 -->
                    </div>
                    <div class="url-input-row">
                        <input type="url" class="url-input" id="json-url-input"
                            placeholder="URLまたは相対パス (例: result/yar_result.json)"
                            inputmode="url" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                        <button class="btn-fetch" id="btn-fetch-url" onclick="fetchJsonFromUrl()">読み込む</button>
                    </div>
                </div>

                <!-- デスクトップ向け: File System Access API / ファイル選択 -->
                <button class="btn-load-stats" id="btn-open-file" onclick="openJsonFile()"
                    style="font-size:11px; padding:12px 16px;">
                    📂 端末内のファイルを選択（PC/Androidのみ）
                </button>
                <div id="file-status" style="display:none; padding:10px 14px; background:#fff; border-radius:12px; border:1px solid var(--slate-200); font-size:11px; color:var(--slate-600); margin-bottom:12px; align-items:center; gap:8px;">
                    <span style="font-size:16px;">📄</span>
                    <span id="file-name-display" style="font-weight:700; flex:1;"></span>
                    <button onclick="openJsonFile()" style="padding:4px 10px; border-radius:8px; border:1px solid var(--slate-300); background:transparent; font-size:10px; font-weight:700; cursor:pointer; color:var(--slate-500);">変更</button>
                    <button onclick="saveToJsonFile()" id="btn-save-json" style="padding:4px 12px; border-radius:8px; border:none; background:var(--emerald-600); color:#fff; font-size:10px; font-weight:900; cursor:pointer;">💾 保存</button>
                </div>
            </div>
            <div id="import-info" style="display:none"></div>
            <div class="stat-card">
                <div class="stat-card-title">Cumulative Trend</div>
                <div class="chart-wrap">
                    <canvas id="chart-trend"></canvas>
                </div>
            </div>
            <div id="stats-summary-container"></div>
            <div class="stat-card">
                <div class="stat-card-title">Archive History</div>
                <div id="archive-list"></div>
                <div class="io-bar">
                    <button class="btn-io" onclick="exportData()">EXPORT JSON</button>
                    <button class="btn-io" onclick="importData()">IMPORT JSON</button>
                </div>
            </div>
        </div>
    </div>

    <div id="player-modal" class="modal-overlay" style="display:none" onclick="closePlayerModal(event)">
        <div class="modal-sheet" id="modal-sheet">
            <div class="modal-handle"></div>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        /* ── State ── */
        let state = {
            view: 'game',
            members: JSON.parse(localStorage.getItem('mj-members') || '["P1","P2","P3","P4","P5","P6"]'),
            history: JSON.parse(localStorage.getItem('mj-history') || '[]'),
            chips: JSON.parse(localStorage.getItem('mj-chips') || '{}'),
            archives: JSON.parse(localStorage.getItem('mj-archives-v5') || '[]'),
            gameMode: 4,
            uma: { 1: 30, 2: 10, 3: -10, 4: -30 },
            activePlayers: [],
            currentPoints: {},
            editingIndex: null,
            scoreMult: parseFloat(localStorage.getItem('mj-mult-s') || '1'),
            chipMult: parseFloat(localStorage.getItem('mj-mult-c') || '1'),
            scoreRate: parseFloat(localStorage.getItem('mj-rate-s') || '100'),
            chipRate: parseFloat(localStorage.getItem('mj-rate-c') || '100'),
            totalPlayers: parseInt(localStorage.getItem('mj-total-players') || '6'),
            baseFee: parseFloat(localStorage.getItem('mj-base-fee') || '0')
        };
        state.activePlayers = state.members.slice(0, state.totalPlayers);

        /* ── File System Access API ── */
        let _fileHandle = null;   // 開いているファイルハンドル
        let _jsonData = null;     // 読み込んだJSONのオリジナルデータ（members等を保持）
        const FS_SUPPORTED = 'showOpenFilePicker' in window;

        /* ── URL Presets ── */
        const JSON_PRESETS = [
            { label: 'yar_result.json', url: 'result/yar_result.json' }
        ];

        function initUrlLoader() {
            const list = document.getElementById('url-preset-list');
            if (!list) return;
            list.innerHTML = '';
            JSON_PRESETS.forEach(preset => {
                const btn = document.createElement('button');
                btn.className = 'url-preset-btn';
                btn.id = 'preset-btn-' + preset.label.replace(/[^a-z0-9]/gi, '_');
                btn.innerHTML = `📄 ${preset.label}`;
                btn.onclick = () => {
                    document.getElementById('json-url-input').value = preset.url;
                    document.querySelectorAll('.url-preset-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                list.appendChild(btn);
            });
            // 最初のプリセットをデフォルト入力に設定
            if (JSON_PRESETS.length > 0) {
                const input = document.getElementById('json-url-input');

        async function fetchJsonFromUrl(urlArg) {
            const input = document.getElementById('json-url-input');
            const url = urlArg || (input ? input.value.trim() : '');
            if (!url) { alert('URLまたはファイルパスを入力してください。'); return; }

            const btn = document.getElementById('btn-fetch-url');
            if (btn) { btn.disabled = true; btn.textContent = '読み込み中…'; }

            try {
                const res = await fetch(url + '?_t=' + Date.now()); // キャッシュ回避
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                const data = await res.json();

                _jsonData = data;
                const newArchives = data.archives || [];
                const newMembers = data.members || [];

                const existingIds = new Set(state.archives.map(a => a.id));
                let addedCount = 0;
                newArchives.forEach(arc => {
                    if (!existingIds.has(arc.id)) { state.archives.push(arc); addedCount++; }
                });
                state.archives.sort((a, b) => new Date(b.id) - new Date(a.id));

                if (newMembers.length > 0) {
                    state.members = [...newMembers];
                    state.activePlayers = newMembers.slice(0, state.totalPlayers);
                }
                save();

                // ファイル名表示（URL最後のパス部分）
                const fileName = url.split('/').pop().split('?')[0];
                updateFileStatusUI(fileName + ' (URL)');

                // 読み込み情報バナー
                const infoDiv = document.getElementById('import-info');
                const totalRounds = newArchives.reduce((s, a) => s + a.history.length, 0);
                infoDiv.style.display = 'block';
                infoDiv.innerHTML = `

                        <div style="font-size:11px;font-weight:800;color:var(--emerald-700);margin-bottom:6px;">✅ ${fileName} を読込みました</div>
                        <div style="font-size:10px;color:var(--slate-500);line-height:1.8;">
                            📅 セッション数: <b>${newArchives.length}</b>件（新規: <b>${addedCount}</b>件）<br>
                            🀄 総半荘数: <b>${totalRounds}</b>回<br>
                            👥 プレイヤー: ${[...new Set(newArchives.flatMap(a => a.players))].join(', ')}
                        </div>
                    </div>`;

                render();
                drawTrendChart();

                if (btn) { btn.textContent = '✅ 完了'; btn.style.background = 'var(--emerald-700)'; }
                setTimeout(() => {
                    if (btn) { btn.disabled = false; btn.textContent = '読み込む'; btn.style.background = ''; }
                }, 2000);

            } catch (e) {
                alert('読み込みに失敗しました:\n' + e.message + '\n\nGitHub Pages等のURLか、同一サーバー上のパスを指定してください。');
                if (btn) { btn.disabled = false; btn.textContent = '読み込む'; }
            }
        }

                // Merge archives
                const existingIds = new Set(state.archives.map(a => a.id));
                let addedCount = 0;
                newArchives.forEach(arc => {
                    if (!existingIds.has(arc.id)) { state.archives.push(arc); addedCount++; }
                });
                state.archives.sort((a, b) => new Date(b.id) - new Date(a.id));

                if (newMembers.length > 0) {
                    state.members = [...newMembers];
                    state.activePlayers = newMembers.slice(0, state.totalPlayers);
                }
                save();
                updateFileStatusUI(file.name);

                // Show summary
                const infoDiv = document.getElementById('import-info');
                const totalRounds = newArchives.reduce((s, a) => s + a.history.length, 0);

        async function saveToJsonFile() {
            if (!_fileHandle) {
                alert('先にJSONファイルを開いてください。');
                return;
            }
            try {
                // 元のJSONデータ構造を維持しつつarchivesとmembersを更新
                const saveData = _jsonData ? { ..._jsonData } : {};
                saveData.archives = [...state.archives].sort((a, b) => new Date(a.id) - new Date(b.id));
                saveData.members = state.members;

                const writable = await _fileHandle.createWritable();
                await writable.write(JSON.stringify(saveData, null, 4));
                await writable.close();

                const btn = document.getElementById('btn-save-json');
                if (btn) {
                    btn.textContent = '✅ 保存済み';
                    btn.style.background = 'var(--emerald-700)';
                    setTimeout(() => { btn.textContent = '💾 保存'; btn.style.background = 'var(--emerald-600)'; }, 2000);
                }
            } catch (e) {
                if (e.name === 'NotAllowedError') {
                    // 権限が失効した場合は再リクエスト
                    const perm = await _fileHandle.requestPermission({ mode: 'readwrite' });
                    if (perm === 'granted') { saveToJsonFile(); }
                } else {
                    alert('保存に失敗しました: ' + e.message);
                }
            }
        }

        /* ── Core Logic ── */
        function calculateScore() {
            let participants = state.activePlayers.map(name => ({
                name,
                rawPoint: parseInt(state.currentPoints[name] || 0)
            }));
            participants.sort((a, b) => b.rawPoint - a.rawPoint);

            // 30,000 baseline, round to nearest 1k
            const getBase = (p) => Math.round((p - 30000) / 1000);

            // Handle ties for Uma
            let results = [];
            let rank = 1;
            for (let i = 0; i < participants.length; i++) {
                let group = [participants[i]];
                while (i + 1 < participants.length && participants[i + 1].rawPoint === participants[i].rawPoint) {
                    group.push(participants[++i]);
                }
                let sumUma = 0;
                for (let j = 0; j < group.length; j++) sumUma += state.uma[rank + j];
                let avgUma = sumUma / group.length;
                group.forEach(p => results.push({ ...p, rank, score: getBase(p.rawPoint) + avgUma }));
                rank += group.length;
            }

            // Top gets the "sweep" (remaining balance to ensure zero-sum)
            let othersTotal = results.filter(r => r.rank !== 1).reduce((s, r) => s + r.score, 0);
            let topCount = results.filter(r => r.rank === 1).length;
            results.forEach(r => { if (r.rank === 1) r.score = (othersTotal * -1) / topCount; });

            const round = state.members.map(name => {
                const p = results.find(r => r.name === name);
                return p ? { name, finalScore: p.score, raw: p.rawPoint, rank: p.rank } : { name, finalScore: 0 };
            });

            if (state.editingIndex !== null) { state.history[state.editingIndex] = round; state.editingIndex = null; }
            else state.history.push(round);

            state.currentPoints = {};
            save();
            render();
        }

        async function archiveSession() {
            if (!confirm("セッションを終了して保存しますか？（現在の履歴はリセットされます）")) return;

            const session = {
                id: new Date().toISOString(),
                date: new Date().toLocaleDateString('ja-JP'),
                players: [...state.activePlayers],
                history: [...state.history],
                chips: { ...state.chips },
                mults: { s: state.scoreMult, c: state.chipMult }
            };

            state.archives.unshift(session);
            state.history = [];
            state.chips = {};
            save();
            switchTab('stats');

            // JSONファイルが開かれていれば自動保存
            if (_fileHandle) {
                await saveToJsonFile();
            } else {
                // ファイルが開かれていない場合はダウンロードで保存
                const saveData = { members: state.members, archives: [...state.archives].sort((a,b)=>new Date(a.id)-new Date(b.id)) };
                const blob = new Blob([JSON.stringify(saveData, null, 4)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `yar_result_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }

                    ${feePerPerson > 0 ? `
                    <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:4px;">
                        <span style="font-size:9px;color:rgba(255,255,255,0.3);font-family:'JetBrains Mono';">場代 -${feePerPerson.toLocaleString()}円</span>
                        <div style="font-size:15px;font-weight:900;font-family:'JetBrains Mono';padding:2px 10px;border-radius:8px;background:${netAmt >= 0 ? 'rgba(251,146,60,0.12)' : 'rgba(96,165,250,0.12)'};color:${netAmt >= 0 ? 'var(--orange-400)' : 'var(--blue-400)'}">
                            ${netAmt >= 0 ? '+' : ''}${Math.round(netAmt).toLocaleString()}円
                        </div>
                    </div>` : ''}
                `;
                cont.appendChild(row);
            });
        }

        function setTotalPlayers(n) {
            state.totalPlayers = n;
            // Remove active players beyond limit
            state.activePlayers = state.activePlayers.filter((_, i) => i < n);
            save();
            render();
        }

        function renderStats() {
            const summary = document.getElementById('stats-summary-container');
            summary.innerHTML = '<div class="stat-card"><div class="stat-card-title">Lifetime Stats</div><div class="stat-grid" id="stats-grid"></div></div>';

            const grid = summary.querySelector('#stats-grid');
            const totalScores = {};
            let totalGames = 0;

            state.archives.forEach(a => {
                totalGames += a.history.length;
                const sessionChips = a.chips || {};
                a.history.forEach(round => {
                    round.forEach(p => {
                        if (!totalScores[p.name]) totalScores[p.name] = { score: 0, games: 0, wins: 0, chips: 0 };
                        if (p.raw !== undefined) {
                            totalScores[p.name].score += p.finalScore;
                            totalScores[p.name].games++;
                            if (p.rank === 1) totalScores[p.name].wins++;
                        }
                    });
                });
                // Add chips once per archive
                Object.entries(sessionChips).forEach(([name, val]) => {
                    if (!totalScores[name]) totalScores[name] = { score: 0, games: 0, wins: 0, chips: 0 };
                    totalScores[name].chips += Number(val || 0);
                });
            });

            state.members.forEach(name => {
                const s = totalScores[name] || { score: 0, games: 0, wins: 0 };
                const avg = s.games > 0 ? (s.score / s.games).toFixed(2) : '0.00';
                const rate = s.games > 0 ? Math.round((s.wins / s.games) * 100) : 0;

                const item = document.createElement('div');
                item.className = 'stat-item';
                item.style.cursor = 'pointer';
                item.onclick = () => openPlayerModal(name);
                item.innerHTML = `
                    <span class="stat-label">${name}</span>
                    <span class="stat-val" style="color:${s.score >= 0 ? 'var(--orange-500)' : 'var(--blue-500)'}">${s.score.toFixed(1)} <span style="font-size:10px; color:${s.chips >= 0 ? 'var(--emerald-500)' : 'var(--rose-500)'};">(${s.chips >= 0 ? '+' : ''}${s.chips})</span></span>
                    <span class="stat-label">Avg: ${avg} / Top: ${rate}%</span>
                `;
                grid.appendChild(item);
            });

            // Archive Cards
            const arcList = document.getElementById('archive-list');
            arcList.innerHTML = state.archives.length === 0 ? '<div style="text-align:center;padding:20px;font-size:12px;color:var(--slate-400)">No data yet.</div>' : '';
            state.archives.forEach((arc, idx) => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="history-header">
                        <span>📅 ${arc.date}</span>
                        <span style="color:red" onclick="deleteArchive(${idx})">DELETE</span>
                    </div>
                    <div class="history-results"></div>
                    <div style="margin-top:10px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
                        <div style="font-size:9px; font-weight:900; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:2px; margin-bottom:8px;">Chip</div>
                        <div class="chip-inputs-grid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:6px;"></div>
                    </div>
                `;
                const resCont = card.querySelector('.history-results');
                arc.players.forEach(p => {
                    const total = arc.history.reduce((sum, r) => sum + (r.find(e => e.name === p)?.finalScore || 0), 0);
                    if (total === 0 && !arc.history.some(r => r.some(e => e.name === p && e.raw !== undefined))) return;
                    const b = document.createElement('span');
                    b.className = 'res-badge';
                    b.style.color = total > 0 ? 'var(--orange-400)' : 'var(--blue-400)';
                    const chipVal = arc.chips?.[p] || 0;
                    const chipStr = chipVal !== 0 ? ` (${chipVal > 0 ? '+' : ''}${chipVal}c)` : '';
                    b.textContent = `${p}: ${total.toFixed(1)}${chipStr}`;
                    resCont.appendChild(b);
                });
                // Chip inputs per player
                const chipGrid = card.querySelector('.chip-inputs-grid');
                arc.players.forEach(p => {
                    const div = document.createElement('div');
                    div.style.cssText = 'display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.05); padding:6px 8px; border-radius:8px;';
                    const currentVal = (arc.chips && arc.chips[p] !== undefined) ? arc.chips[p] : '';
                    div.innerHTML = `
                        <span style="font-size:11px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p}</span>
                        <input type="number" placeholder="0"
                            style="width:52px; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.2); color:#fff; text-align:right; font-family:'JetBrains Mono'; font-size:13px; outline:none;"
                            value="${currentVal}"
                            onchange="updateArchiveChip(${idx}, '${p.replace(/'/g, "\\'")}'  , this.value)">
                    `;
                    chipGrid.appendChild(div);
                });
                arcList.appendChild(card);
            });
        }

        /* ── Canvas Chart (No Libraries) ── */
        function drawTrendChart() {
            const canvas = document.getElementById('chart-trend');
            const ctx = canvas.getContext('2d');
            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            canvas.width = w * 2; canvas.height = h * 2; // Hi-DPI
            ctx.scale(2, 2);

            if (state.archives.length === 0) return;

            const players = state.members;
            const colors = ['#fb923c', '#60a5fa', '#34d399', '#a78bfa', '#f43f5e', '#fbbf24'];

            // Calculate cumulative points over sessions
            let data = players.map(() => [0]);
            [...state.archives].reverse().forEach(arc => {
                players.forEach((name, i) => {
                    const sessionTotal = arc.history.reduce((sum, r) => sum + (r.find(e => e.name === name)?.finalScore || 0), 0);
                    const lastVal = data[i][data[i].length - 1];
                    data[i].push(lastVal + sessionTotal);
                });
            });

            const maxPoints = Math.max(...data.flat(), 50);
            const minPoints = Math.min(...data.flat(), -50);
            const range = maxPoints - minPoints;
            const stepX = w / (data[0].length - 1);

            ctx.clearRect(0, 0, w, h);

            // Grid lines
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.beginPath();
            const zeroY = h - ((0 - minPoints) / range) * h;
            ctx.moveTo(0, zeroY); ctx.lineTo(w, zeroY);
            ctx.stroke();

            // Lines
            data.forEach((points, pi) => {
                ctx.strokeStyle = colors[pi % colors.length];
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.beginPath();
                points.forEach((p, i) => {
                    const x = i * stepX;
                    const y = h - ((p - minPoints) / range) * h;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();
            });
        }

        /* ── Helpers ── */
        function togglePlayer(name) {
            if (state.activePlayers.includes(name)) {
                state.activePlayers = state.activePlayers.filter(p => p !== name);
            } else if (state.activePlayers.length < state.gameMode) {
                state.activePlayers.push(name);
            }
            render();
        }

        function renamePlayer(idx, val) {
            const old = state.members[idx];
            state.members[idx] = val;
            state.activePlayers = state.activePlayers.map(p => p === old ? val : p);
            save(); render();
        }

        function editRound(idx) {
            state.editingIndex = idx;
            const round = state.history[idx];
            state.activePlayers = round.filter(r => r.raw !== undefined).map(r => r.name);
            state.currentPoints = {};
            round.forEach(r => { if (r.raw !== undefined) state.currentPoints[r.name] = r.raw; });
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateArchiveChip(idx, name, value) {
            if (!state.archives[idx].chips) state.archives[idx].chips = {};
            state.archives[idx].chips[name] = Number(value) || 0;
            save();
            renderStats();
        }

        function openPlayerModal(name) {
            // ── Collect data ──
            const rounds = [];       // { finalScore, rank, sessionDate }
            const sessionTotals = []; // cumulative per session
            let chipTotal = 0;

            state.archives.forEach(arc => {
                let sessionScore = 0;
                arc.history.forEach(round => {
                    const p = round.find(r => r.name === name && r.raw !== undefined);
                    if (p) {
                        rounds.push({ finalScore: p.finalScore, rank: p.rank, date: arc.date });
                        sessionScore += p.finalScore;
                    }
                });
                if (arc.history.some(r => r.some(p => p.name === name && p.raw !== undefined))) {
                    sessionTotals.push({ date: arc.date, score: sessionScore });
                }
                chipTotal += Number(arc.chips?.[name] || 0);
            });

            const totalScore = rounds.reduce((s, r) => s + r.finalScore, 0);
            const games = rounds.length;
            const avg = games > 0 ? (totalScore / games) : 0;

            // Rank stats
            const rankColors = ['', '#fb923c', '#60a5fa', '#94a3b8', '#475569'];
            const rankData = [1, 2, 3, 4].map(rank => {
                const rs = rounds.filter(r => r.rank === rank);
                return {
                    rank,
                    count: rs.length,
                    avg: rs.length > 0 ? rs.reduce((s, r) => s + r.finalScore, 0) / rs.length : null
                };
            });

            const bestRound = rounds.reduce((b, r) => r.finalScore > (b?.finalScore ?? -Infinity) ? r : b, null);
            const worstRound = rounds.reduce((w, r) => r.finalScore < (w?.finalScore ?? Infinity) ? r : w, null);

            // ── Build modal HTML ──
            const content = document.getElementById('modal-content');
            content.innerHTML = '';

            // Header
            const scoreColor = totalScore >= 0 ? 'var(--orange-400)' : 'var(--blue-400)';
            const chipColor = chipTotal >= 0 ? 'var(--emerald-400)' : '#f87171';
            content.innerHTML = `
                <div style="margin-bottom:20px;">
                    <div style="font-size:22px; font-weight:900; letter-spacing:-1px; margin-bottom:4px;">${name}</div>
                    <div style="font-size:12px; color:rgba(255,255,255,0.4);">${games}戦 / ${state.archives.filter(a => a.history.some(r => r.some(p => p.name === name && p.raw !== undefined))).length}セッション</div>
                </div>
                <div class="modal-stat-grid">
                    <div class="modal-stat-item">
                        <span class="modal-stat-val" style="color:${scoreColor}">${totalScore.toFixed(1)}</span>
                        <span class="modal-stat-label">Total</span>
                    </div>
                    <div class="modal-stat-item">
                        <span class="modal-stat-val" style="color:${avg >= 0 ? 'var(--orange-400)' : 'var(--blue-400)'}">${avg.toFixed(2)}</span>
                        <span class="modal-stat-label">Avg/Game</span>
                    </div>
                    <div class="modal-stat-item">
                        <span class="modal-stat-val" style="color:${chipColor}">${chipTotal >= 0 ? '+' : ''}${chipTotal}</span>
                        <span class="modal-stat-label">Chips</span>
                    </div>
                </div>
            `;

            // Score trend chart (canvas)
            if (sessionTotals.length > 1) {
                const secTitle1 = document.createElement('div');
                secTitle1.className = 'modal-section-title';
                secTitle1.textContent = 'Score Trend (per session)';
                content.appendChild(secTitle1);

                const wrap = document.createElement('div');
                wrap.style.cssText = 'width:100%; height:160px; position:relative; margin-bottom:4px;';
                const canvas = document.createElement('canvas');
                canvas.id = 'modal-chart';
                canvas.style.cssText = 'width:100%; height:100%;';
                wrap.appendChild(canvas);
                content.appendChild(wrap);

                // Draw after DOM insert
                requestAnimationFrame(() => {
                    const ctx = canvas.getContext('2d');
                    const w = canvas.offsetWidth;
                    const h = canvas.offsetHeight;
                    canvas.width = w * 2; canvas.height = h * 2;
                    ctx.scale(2, 2);

                    // Cumulative data
                    const cumData = [0];
                    sessionTotals.slice().reverse().forEach(s => cumData.push(cumData[cumData.length - 1] + s.score));

                    const maxV = Math.max(...cumData, 10);
                    const minV = Math.min(...cumData, -10);
                    const range = maxV - minV || 1;
                    const stepX = w / (cumData.length - 1);
                    const toY = v => h - ((v - minV) / range) * (h - 16) - 8;

                    // Zero line
                    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    const zy = toY(0);
                    ctx.moveTo(0, zy); ctx.lineTo(w, zy);
                    ctx.stroke();

                    // Gradient fill
                    const grad = ctx.createLinearGradient(0, 0, 0, h);
                    grad.addColorStop(0, 'rgba(251,146,60,0.3)');
                    grad.addColorStop(1, 'rgba(251,146,60,0)');
                    ctx.beginPath();
                    cumData.forEach((v, i) => {
                        const x = i * stepX, y = toY(v);
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    });
                    ctx.lineTo((cumData.length - 1) * stepX, h);
                    ctx.lineTo(0, h);
                    ctx.closePath();
                    ctx.fillStyle = grad;
                    ctx.fill();

                    // Line
                    ctx.strokeStyle = '#fb923c';
                    ctx.lineWidth = 2.5;
                    ctx.lineJoin = 'round';
                    ctx.beginPath();
                    cumData.forEach((v, i) => {
                        const x = i * stepX, y = toY(v);
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    });
                    ctx.stroke();

                    // Dots
                    cumData.forEach((v, i) => {
                        const x = i * stepX, y = toY(v);
                        ctx.beginPath();
                        ctx.arc(x, y, 3, 0, Math.PI * 2);
                        ctx.fillStyle = '#fb923c';
                        ctx.fill();
                    });

                    // Final value label
                    const lastV = cumData[cumData.length - 1];
                    ctx.fillStyle = lastV >= 0 ? '#fb923c' : '#60a5fa';
                    ctx.font = 'bold 11px JetBrains Mono, monospace';
                    ctx.textAlign = 'right';
                    ctx.fillText(lastV.toFixed(1), w - 2, toY(lastV) - 6);
                });
            }

            // Rank distribution
            const secTitle2 = document.createElement('div');
            secTitle2.className = 'modal-section-title';
            secTitle2.textContent = 'Rank Distribution';
            content.appendChild(secTitle2);

            rankData.forEach(rd => {
                const pct = games > 0 ? (rd.count / games) * 100 : 0;
                const row = document.createElement('div');
                row.className = 'rank-bar-row';
                row.innerHTML = `
                    <span class="rank-bar-label" style="color:${rankColors[rd.rank]}">${rd.rank}位</span>
                    <div class="rank-bar-bg">
                        <div class="rank-bar-fill" style="width:${pct.toFixed(1)}%; background:${rankColors[rd.rank]};"></div>
                    </div>
                    <span class="rank-bar-count">${rd.count}回 ${pct.toFixed(0)}%</span>
                `;
                content.appendChild(row);
            });

            // Per-rank average table
            const secTitle3 = document.createElement('div');
            secTitle3.className = 'modal-section-title';
            secTitle3.textContent = 'Avg Score by Rank';
            content.appendChild(secTitle3);

            const table = document.createElement('table');
            table.className = 'rank-avg-table';
            table.innerHTML = `
                <thead><tr>
                    <th>Rank</th><th>Count</th><th>Avg Score</th><th>Rate</th>
                </tr></thead>
                <tbody>${rankData.map(rd => `
                    <tr>
                        <td style="color:${rankColors[rd.rank]}; font-weight:900;">${rd.rank}位</td>
                        <td>${rd.count}</td>
                        <td style="color:${rd.avg === null ? 'rgba(255,255,255,0.3)' : rd.avg >= 0 ? 'var(--orange-400)' : 'var(--blue-400)'}">
                            ${rd.avg === null ? '—' : rd.avg.toFixed(2)}
                        </td>
                        <td style="color:rgba(255,255,255,0.5)">${games > 0 ? ((rd.count / games) * 100).toFixed(1) : 0}%</td>
                    </tr>
                `).join('')}</tbody>
            `;
            content.appendChild(table);

            // Best / Worst
            if (bestRound || worstRound) {
                const secTitle4 = document.createElement('div');
                secTitle4.className = 'modal-section-title';
                secTitle4.textContent = 'Best / Worst Game';
                content.appendChild(secTitle4);

                const bwGrid = document.createElement('div');
                bwGrid.style.cssText = 'display:grid; grid-template-columns:1fr 1fr; gap:8px;';
                bwGrid.innerHTML = `
                    <div class="modal-stat-item">
                        <span class="modal-stat-val" style="color:var(--orange-400)">${bestRound ? '+' + bestRound.finalScore.toFixed(1) : '—'}</span>
                        <span class="modal-stat-label">Best</span>
                    </div>
                    <div class="modal-stat-item">
                        <span class="modal-stat-val" style="color:var(--blue-400)">${worstRound ? worstRound.finalScore.toFixed(1) : '—'}</span>
                        <span class="modal-stat-label">Worst</span>
                    </div>
                `;
                content.appendChild(bwGrid);
            }

            document.getElementById('player-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayerModal(event) {
            if (event && event.target !== document.getElementById('player-modal')) return;
            document.getElementById('player-modal').style.display = 'none';
            document.body.style.overflow = '';
        }

        function deleteArchive(idx) {
            if (confirm("この履歴を完全に削除しますか？")) {
                state.archives.splice(idx, 1);
                save(); render(); drawTrendChart();
            }
        }

        function resetAll() {
            if (confirm("全てのデータをリセットしますか？（アーカイブ含む）")) {
                localStorage.clear();
                location.reload();
            }
        }

        function el(tag, attrs, text) {
            const e = document.createElement(tag);
            if (attrs) Object.entries(attrs).forEach(([k, v]) => {
                if (k.startsWith('on')) e[k] = () => eval(v);
                else e.setAttribute(k, v);
            });
            if (text) e.textContent = text;
            return e;
        }

        /* ── IO ── */
        function exportData() {
            const saveData = _jsonData ? { ..._jsonData } : {};
            saveData.archives = [...state.archives].sort((a, b) => new Date(a.id) - new Date(b.id));
            saveData.members = state.members;
            const blob = new Blob([JSON.stringify(saveData, null, 4)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `yar_result_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData() {
            openJsonFile();
        }

        // フォールバック用（File System Access API非対応時）
        function importStatsFileFallback() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const data = JSON.parse(reader.result);
                        _jsonData = data;
                        const newArchives = data.archives || [];
                        const newMembers = data.members || [];

                        if (newArchives.length === 0) {
                            alert('このJSONにはアーカイブデータがありません。');
                            return;
                        }

                        const existingIds = new Set(state.archives.map(a => a.id));
                        let addedCount = 0;
                        newArchives.forEach(arc => {
                            if (!existingIds.has(arc.id)) { state.archives.push(arc); addedCount++; }
                        });
                        state.archives.sort((a, b) => new Date(b.id) - new Date(a.id));

                        if (newMembers.length > 0) {
                            state.members = [...newMembers];
                            state.activePlayers = newMembers.slice(0, state.totalPlayers);
                        }
                        save();
                        updateFileStatusUI(file.name);

                        const infoDiv = document.getElementById('import-info');
                        const totalRounds = newArchives.reduce((s, a) => s + a.history.length, 0);
                        infoDiv.style.display = 'block';
                        infoDiv.innerHTML = `
                            <div class="stat-card" style="border-left:4px solid var(--emerald-500);padding:14px 16px;">
                                <div style="font-size:11px;font-weight:800;color:var(--emerald-700);margin-bottom:6px;">✅ ${file.name} を読込みました（※ブラウザ制限により上書き保存不可）</div>
                                <div style="font-size:10px;color:var(--slate-500);line-height:1.8;">
                                    📅 セッション数: <b>${newArchives.length}</b>件（新規: <b>${addedCount}</b>件）<br>
                                    🀄 総半荘数: <b>${totalRounds}</b>回<br>
                                    👥 プレイヤー: ${[...new Set(newArchives.flatMap(a => a.players))].join(', ')}
                                </div>
                            </div>`;
                        render();
                        drawTrendChart();
                    } catch (err) {
                        alert('JSONファイルの読込に失敗しました: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Init
        render();
        // STATSタブが最初から表示されている場合にURLローダーを初期化
        if (state.view === 'stats') initUrlLoader();

        // Service Worker 登録（PWA対応）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
